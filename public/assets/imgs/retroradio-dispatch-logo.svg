<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 260" role="img" aria-labelledby="title desc">
  <title id="title">RetroRadio Dispatch Brand Logo</title>
  <desc id="desc">Synthwave mountain and grid with script RetroRadio wordmark and dispatch subtitle.</desc>
  <defs>
    <linearGradient id="mountainStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#23D7FF" />
      <stop offset="48%" stop-color="#8A5DFF" />
      <stop offset="100%" stop-color="#B786FF" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#23D7FF" />
      <stop offset="100%" stop-color="#2EB8FF" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#20D6FF" flood-opacity="0.65" />
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#8F62FF" flood-opacity="0.78" />
    </filter>
  </defs>

  <g transform="translate(310,10)">
    <g filter="url(#glow)" opacity="0.95">
      <path d="M-180 130 H180" stroke="#1ECFFF" stroke-width="2.2" />
      <path d="M-165 118 H165 M-150 106 H150 M-134 94 H134 M-118 82 H118 M-100 70 H100 M-82 58 H82"
        stroke="#1AC8F7" stroke-width="1.3" opacity="0.55" />
      <path d="M-158 130 L-78 54 L0 24 L78 54 L158 130 M-124 130 L-62 62 L0 36 L62 62 L124 130 M-90 130 L-44 70 L0 48 L44 70 L90 130 M-56 130 L-26 78 L0 60 L26 78 L56 130"
        stroke="#1ED0FF" stroke-width="1.2" opacity="0.5" fill="none" />
    </g>

    <path
      d="M-172 130 L-145 108 L-128 114 L-106 92 L-90 98 L-72 79 L-54 84 L-36 66 L-18 72 L0 22 L18 72 L36 66 L54 84 L72 79 L90 98 L106 92 L128 114 L145 108 L172 130"
      fill="none"
      stroke="url(#mountainStroke)"
      stroke-width="5"
      stroke-linecap="round"
      stroke-linejoin="round"
      filter="url(#glow)"
    />

    <g transform="translate(0,188)" filter="url(#glow)">
      <text x="0" y="0"
        text-anchor="middle"
        font-size="72"
        font-family="'Brush Script MT', 'Segoe Script', 'Snell Roundhand', cursive"
        fill="url(#textGrad)">RetroRadio</text>
      <text x="0" y="30"
        text-anchor="middle"
        font-size="14"
        letter-spacing="4.5"
        font-family="'Montserrat', 'Avenir Next', 'Segoe UI', sans-serif"
        fill="#2EDCFF"
        opacity="0.98">DISPATCH PORTAL</text>
    </g>
  </g>
</svg>
